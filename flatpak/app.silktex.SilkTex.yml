#
# Local development manifest. GNOME Builder can open this file directly and
# build the current checkout as a Flatpak.
#
# LaTeX tools come from org.freedesktop.Sdk.Extension.texlive, mounted at
# /app/texlive and exposed through PATH.
app-id: app.silktex.SilkTex
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: silktex

add-extensions:
  org.freedesktop.Sdk.Extension.texlive:
    directory: texlive
    subdirectories: true
    autodelete: true
    version: '25.08'

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=host
  - --filesystem=xdg-config/silktex:create
  - --filesystem=xdg-cache/silktex:create
  - --talk-name=org.freedesktop.portal.OpenURI
  - --talk-name=org.freedesktop.Flatpak
  - --env=PATH=/app/texlive/bin:/app/texlive/bin/x86_64-linux:/app/texlive/bin/aarch64-linux:/app/bin:/usr/bin
  - --env=LD_LIBRARY_PATH=/app/texlive/lib
  # Avoid Mesa/Zink EGL startup failures on systems without a usable GPU path.
  - --env=GSK_RENDERER=cairo

cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/gtk-doc
  - /share/man
  - '*.la'
  - '*.a'

modules:
  - name: texlive-extension-point
    buildsystem: simple
    build-commands:
      - mkdir -p /app/texlive

  - name: poppler
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_GTK_TESTS=OFF
      - -DBUILD_QT5_TESTS=OFF
      - -DBUILD_QT6_TESTS=OFF
      - -DBUILD_CPP_TESTS=OFF
      - -DENABLE_BOOST=OFF
      - -DENABLE_CPP=OFF
      - -DENABLE_GLIB=ON
      - -DENABLE_GOBJECT_INTROSPECTION=OFF
      - -DENABLE_GTK_DOC=OFF
      - -DENABLE_QT5=OFF
      - -DENABLE_QT6=OFF
      - -DENABLE_UTILS=OFF
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/poppler/poppler.git
        tag: poppler-25.07.0

  - name: silktex
    buildsystem: meson
    config-opts:
      - --buildtype=debugoptimized
      - --libdir=lib
    sources:
      - type: dir
        path: ..
