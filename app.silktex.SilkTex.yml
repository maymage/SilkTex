#
# Release manifest for Flathub.
#
# LaTeX tools are provided by org.freedesktop.Sdk.Extension.texlive, mounted
# at /app/texlive and exposed through PATH.
app-id: app.silktex.SilkTex
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: silktex

add-extensions:
  org.freedesktop.Sdk.Extension.texlive:
    directory: texlive
    subdirectories: true
    autodelete: true
    version: '25.08'

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --filesystem=xdg-download:rw
  - --filesystem=xdg-documents:rw
  - --talk-name=org.freedesktop.portal.OpenURI
  - --env=PATH=/app/texlive/bin:/app/texlive/bin/x86_64-linux:/app/texlive/bin/aarch64-linux:/app/bin:/usr/bin
  - --env=LD_LIBRARY_PATH=/app/texlive/lib
  # Avoid Mesa/Zink EGL startup failures on systems without a usable GPU path.
  - --env=GSK_RENDERER=cairo

cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/gtk-doc
  - /share/man
  - '*.la'
  - '*.a'

modules:
  - name: texlive-extension-point
    buildsystem: simple
    build-commands:
      - mkdir -p /app/texlive

  - name: poppler
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_GTK_TESTS=OFF
      - -DBUILD_QT5_TESTS=OFF
      - -DBUILD_QT6_TESTS=OFF
      - -DBUILD_CPP_TESTS=OFF
      - -DENABLE_BOOST=OFF
      - -DENABLE_CPP=OFF
      - -DENABLE_GLIB=ON
      - -DENABLE_GOBJECT_INTROSPECTION=OFF
      - -DENABLE_GTK_DOC=OFF
      - -DENABLE_QT5=OFF
      - -DENABLE_QT6=OFF
      - -DENABLE_UTILS=OFF
    sources:
      - type: git
        url: https://gitlab.freedesktop.org/poppler/poppler.git
        tag: poppler-25.07.0
        commit: e4e52f48c64085dc6fda0befc43843ab72b87b35

  - name: silktex
    buildsystem: meson
    config-opts:
      - --buildtype=release
      - --libdir=lib
    sources:
      - type: git
        url: https://github.com/DERK0CHER/SilkTex.git
        tag: v1.0.3
        commit: da08ab052c19c33af569e730d8743f683c6e726b
        x-checker-data:
          type: git
          tag-pattern: '^v([\d.]+)$'
